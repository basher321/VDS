# Render Blueprint -- lets you create both services in one step via
# https://dashboard.render.com/blueprints  ("New +" -> "Blueprint", point at this repo).
# DATABASE_URL and SECRET_KEY are marked sync: false, so Render will prompt for
# them once instead of storing values here. Everything else has a working default.
#
# If you'd rather create the services by hand via "New Web Service" (one at a time),
# this file also documents exactly what to type into each field -- see README.md.
services:
  - type: web
    name: vds-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DATA_DIR
        value: ./data
      - key: CORS_ORIGINS
        value: https://vds-frontend.onrender.com,http://localhost:3000

  - type: web
    name: vds-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_BASE
        value: https://vds-backend.onrender.com
